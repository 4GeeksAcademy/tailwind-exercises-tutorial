<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>08 Tailwind Forms</title>
	</head>
	<body>
		<div class="w-1/4 mx-auto my-10">
			<!-- Add your code below this line -->
			<form action="#" class="bg-gray-600 rounded p-8 text-white">
				<h2 class="text-2xl mb-4">Please login</h2>
				<div class="mb-3">
					<input type="email" class="w-full rounded px-3 py-2 text-black" placeholder="Email Address" />
				</div>
				<div class="mb-2">
					<input type="password" class="w-full rounded px-3 py-2 text-black" placeholder="Password" />
				</div>

				<input type="checkbox" class="mb-3" /> <label>Remember me</label>
				<button type="button" class="bg-blue-600 w-full rounded text-white py-2 mt-3">Login</button>
			</form>
		</div>
	</body>
</html>
