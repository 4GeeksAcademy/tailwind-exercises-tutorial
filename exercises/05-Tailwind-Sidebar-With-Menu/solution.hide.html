<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>05 Tailwind Sidebar With Menu</title>
	</head>
	<body>
		<div class="w-full">
			<div class="flex">
				<div class="w-1/6 p-3">
					<ul class="flex flex-col gap-2 list-none pl-0">
						<li>
							<a class="text-blue-600" aria-current="page" href="#">Home</a>
						</li>
						<li>
							<a class="text-blue-600" href="#">Profile</a>
						</li>
						<li>
							<a class="text-blue-600" href="#">Messages</a>
						</li>
					</ul>
				</div>
				<div class="w-5/6 bg-gray-100 p-3">
					<h4>Hello!</h4>
					<p>
						I'm excited to use Tailwind because now I don't have to fight with CSS anymore, I made this layout in 20 minutes and before it
						took me 2 hours easily!
					</p>
					<button class="bg-blue-600 text-white px-4 py-2 rounded">Click me!</button>
				</div>
			</div>
		</div>
	</body>
</html>
